spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    target: 2

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-algorithms
  expiration-ms: 86400000
