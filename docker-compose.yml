services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: attendance
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: attendance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendance"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: attendance
      DB_USERNAME: attendance
      DB_PASSWORD: attendance
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-must-be-at-least-256-bits}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
